# CI: lint, test, build and push a versioned image to GitHub Container Registry (GHCR).
# Tags: semantic version (from Git tags v*.*.*), immutable build-<run_number>, sha-<short>,
# and latest on the default branch only. See README — Versioning and releases.
name: CI — test and push versioned Docker image

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with unittest
        run: python -m unittest discover

  build-and-push:
    name: Build and push to GHCR
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      BUILD_VERSION: build-${{ github.run_number }}
    steps:
      - name: Check out repository (full history for semver tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Image name (lowercase for GHCR)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Short Git SHA
        id: git
        run: echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.BUILD_VERSION }},enable=true
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=CI/CD tutorial sample app
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            ci.build-version=${{ env.BUILD_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.BUILD_VERSION }}
            GIT_COMMIT_SHORT=${{ steps.git.outputs.short }}

      - name: Log published tags (traceability)
        run: |
          echo "::notice::Published image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "::notice::Tags:" && echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n'
          echo "::notice::Build version (APP_VERSION in container): ${{ env.BUILD_VERSION }}"
          echo "::notice::Git revision: ${{ github.sha }}"
