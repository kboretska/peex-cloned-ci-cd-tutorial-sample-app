# CI: lint, test, build and push a versioned image to GitHub Container Registry (GHCR).
# Tags: SemVer from Git tags v*.*.*, immutable build-<N>, sha-<short>, latest.
# APP_SEMVER from VERSION file is baked into the image (not repeated as 0.1.0-build-N on the registry).
# Security: pip-audit (PyPI CVEs), Trivy (image), least-privilege job permissions — see README → Security.
# Feedback: Slack (optional SLACK_WEBHOOK_URL secret) + GitHub email/notifications — see README.
name: CI — test and push versioned Docker image

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Lint and test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fail on CRITICAL Python CVEs (pip-audit + OSV CVSS)
        run: |
          pip install cvss
          python .github/scripts/pip_audit_critical_gate.py

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with unittest
        run: python -m unittest discover

  build-and-push:
    name: Build and push to GHCR
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    env:
      BUILD_VERSION: build-${{ github.run_number }}
    steps:
      - name: Check out repository (full history for semver tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SemVer from VERSION file (for image labels and /version)
        run: |
          V=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0")
          echo "APP_SEMVER=$V" >> "$GITHUB_ENV"

      - name: Image name (lowercase for GHCR)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Short Git SHA
        id: git
        run: echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.BUILD_VERSION }},enable=true
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=CI/CD tutorial sample app
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.APP_SEMVER }}
            ci.build-version=${{ env.BUILD_VERSION }}
            ci.app-semver=${{ env.APP_SEMVER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load, for Trivy scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scan
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_SEMVER }}
            APP_SEMVER=${{ env.APP_SEMVER }}
            GIT_COMMIT_SHORT=${{ steps.git.outputs.short }}
            CI_RUN_NUMBER=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scan
          severity: CRITICAL
          exit-code: "1"
          format: table

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_SEMVER }}
            APP_SEMVER=${{ env.APP_SEMVER }}
            GIT_COMMIT_SHORT=${{ steps.git.outputs.short }}
            CI_RUN_NUMBER=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log published tags (traceability)
        run: |
          echo "::notice::Published image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "::notice::Tags:" && echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n'
          echo "::notice::VERSION / app_semver: ${{ env.APP_SEMVER }}"
          echo "::notice::CI run number (also in /version): ${{ github.run_number }}"
          echo "::notice::Git revision: ${{ github.sha }}"

  slack-notify-ci:
    name: Slack — CI (lint + tests)
    needs: [test]
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Slack
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFY_OUTCOME: ${{ needs.test.result }}
          NOTIFY_TITLE: 'CI — lint and tests'
          NOTIFY_EXTRA: 'Stage: CI (no Docker push on pull_request).'
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/slack_notify.py

  slack-notify-cd:
    name: Slack — CD (Docker push to GHCR)
    needs: [build-and-push]
    if: ${{ always() && needs.build-and-push.result != 'skipped' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Slack
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFY_OUTCOME: ${{ needs.build-and-push.result }}
          NOTIFY_TITLE: 'CD — Docker image push (GHCR)'
          NOTIFY_EXTRA: 'Stage: CD (Docker image pushed to GitHub Container Registry).'
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/slack_notify.py
