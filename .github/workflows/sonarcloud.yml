# Third-party: SonarCloud code quality + Quality Gate (fails the job if the gate fails).
# Requires repository secrets: SONAR_TOKEN (from SonarCloud). See README — Third-party integrations.
name: SonarCloud

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies and coverage
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage

      - name: Run tests with coverage
        run: |
          coverage run -m unittest discover
          coverage xml -o coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
