# On-demand release: deploy a specific image tag from GHCR, or roll back by choosing an older tag.
# Rollback does not rebuild the image — it pulls an immutable tag already stored in the registry.
# Optional Slack notifications via GitHub secret SLACK_WEBHOOK_URL — see README.
# Use ASCII in `name` only — Unicode punctuation (e.g. em dash) can prevent the workflow from appearing in the Actions UI on some setups.
name: Release - deploy by image version

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Image tag to deploy (e.g. build-42, sha-abc1234, 1.2.3, or latest)'
        required: true
      deployment_label:
        description: 'Optional label for logs (e.g. production, staging, rollback-to-build-41)'
        required: false
        default: manual

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy selected version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image reference
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ github.event.inputs.image_version }}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull immutable artifact
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "::notice::Deployment label: ${{ github.event.inputs.deployment_label }}"
          echo "::notice::Pulling $IMAGE"
          docker pull "$IMAGE"

      - name: Run container and verify (smoke)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker rm -f app-release-smoke 2>/dev/null || true
          docker run -d --name app-release-smoke -p 8000:8000 "$IMAGE"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/ >/dev/null; then break; fi
            sleep 1
          done
          echo "::group::GET /version (traceability)"
          curl -sf http://127.0.0.1:8000/version | tee version.json
          echo "::endgroup::"
          docker stop app-release-smoke
          docker rm app-release-smoke

      - name: Summary
        run: |
          echo "## Deployed image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${{ env.REGISTRY }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag (immutable ref) | \`${{ env.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment label | \`${{ github.event.inputs.deployment_label }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To **roll back**, run this workflow again with an older tag (e.g. previous \`build-*\` or \`sha-*\`). No rebuild required." >> "$GITHUB_STEP_SUMMARY"

  slack-notify-release:
    name: Slack — CD (release deploy)
    needs: [deploy]
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Slack webhook (GitHub secret)
        uses: ./.github/actions/slack-webhook-env
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Notify Slack
        continue-on-error: true
        env:
          NOTIFY_OUTCOME: ${{ needs.deploy.result }}
          NOTIFY_TITLE: 'CD — release deploy (smoke test)'
          NOTIFY_EXTRA: 'Image tag: `${{ github.event.inputs.image_version }}`; label: `${{ github.event.inputs.deployment_label }}`'
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/slack_notify.py
